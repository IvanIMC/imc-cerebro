name: GESU Cron Import

on:
  workflow_dispatch:
  schedule:
    - cron: "0,30 * * * *"

jobs:
  trigger-gesu-import:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger secure GESU import
        run: |
          HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" \
            -X POST "${{ secrets.RAILWAY_GESU_URL }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")

          echo "HTTP_CODE=$HTTP_CODE"
          cat response.json

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Workflow failed because endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi
